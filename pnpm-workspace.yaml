packages:
  - apps/**
  - packages/**

# Approve esbuild's postinstall build. pnpm v11 requires an explicit
# allowBuilds decision per package with a build script; without `true` here it
# emits ERR_PNPM_IGNORED_BUILDS, fails `pnpm install` (exit 1), and leaves
# esbuild (vite's bundler) unset so the showcase build breaks.
allowBuilds:
  esbuild: true
