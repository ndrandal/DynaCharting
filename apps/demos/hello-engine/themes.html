<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>DynaCharting - Theme Showcase</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      body { display: flex; flex-direction: column; background: var(--bg, #0b0f14); transition: background 0.4s; overflow: hidden; }

      /* ---- Top bar ---- */
      #topbar {
        display: flex; align-items: center; gap: 10px;
        padding: 10px 16px;
        background: rgba(0,0,0,0.35); backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        z-index: 10; flex-shrink: 0;
      }
      #topbar .brand {
        font-size: 14px; font-weight: 700; letter-spacing: 0.5px;
        color: var(--fg, #e8e8f0); margin-right: 12px;
      }
      #topbar .sep { width: 1px; height: 20px; background: rgba(255,255,255,0.1); }

      .theme-btn {
        font: 11px/1 inherit; padding: 6px 14px;
        background: rgba(255,255,255,0.06); color: var(--fg, #c8c8d0);
        border: 1px solid rgba(255,255,255,0.08); border-radius: 6px;
        cursor: pointer; transition: all 0.2s; user-select: none;
      }
      .theme-btn:hover { background: rgba(255,255,255,0.12); }
      .theme-btn.active {
        background: var(--accent, rgba(59,130,246,0.4));
        border-color: var(--accent-border, rgba(59,130,246,0.6));
        color: #fff;
      }

      #theme-label {
        margin-left: auto; font-size: 11px; color: var(--fg-muted, rgba(200,200,208,0.5));
      }

      /* ---- Canvas area ---- */
      #canvas-wrap { flex: 1; position: relative; }
      canvas { width: 100%; height: 100%; display: block; }

      /* ---- Overlays ---- */
      .ov {
        position: absolute;
        font: 12px/1.5 inherit;
        color: var(--fg, #c8c8d0); background: var(--panel-bg, rgba(8,10,18,0.75));
        border-radius: 10px; border: 1px solid rgba(255,255,255,0.06);
        user-select: none; pointer-events: none;
        backdrop-filter: blur(8px); transition: background 0.4s, color 0.4s;
      }

      /* HUD */
      #hud { left: 12px; top: 12px; padding: 10px 14px; }
      #hud .muted { opacity: 0.55; }

      /* OHLC */
      #ohlc { right: 12px; top: 12px; padding: 12px 16px; min-width: 155px; }
      #ohlc .title { font-weight: 700; color: var(--fg, #e8e8f0); margin-bottom: 4px; font-size: 14px; }
      .ohlc-row { display: flex; gap: 8px; }
      .ohlc-label { opacity: 0.45; width: 18px; }
      .ohlc-val { font-variant-numeric: tabular-nums; }

      /* Labels */
      .plbl {
        position: absolute; left: 50%; transform: translateX(-50%);
        font: 11px/1 inherit; color: var(--fg-muted, rgba(200,200,208,0.25));
        user-select: none; pointer-events: none; transition: color 0.4s;
      }

      /* Controls hint */
      #ctrlhint {
        position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
        font-size: 11px; padding: 5px 14px; white-space: nowrap;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <!-- Top bar with theme selector -->
    <div id="topbar">
      <span class="brand">DynaCharting</span>
      <div class="sep"></div>
      <button class="theme-btn active" data-theme="dark">Dark</button>
      <button class="theme-btn" data-theme="midnight">Midnight</button>
      <button class="theme-btn" data-theme="neon">Neon</button>
      <button class="theme-btn" data-theme="pastel">Pastel</button>
      <button class="theme-btn" data-theme="bloomberg">Bloomberg</button>
      <button class="theme-btn" data-theme="light">Light</button>
      <span id="theme-label">Theme: Dark</span>
    </div>

    <!-- Canvas -->
    <div id="canvas-wrap">
      <canvas id="c"></canvas>

      <div id="hud" class="ov">
        <div style="font-weight:700; margin-bottom:2px;">Theme Showcase</div>
        <div>FPS: <span id="fps">0</span></div>
        <div class="muted">Frame: <span id="framems">0</span> ms</div>
        <div class="muted">Draw: <span id="drawcalls">0</span></div>
        <div class="muted">Bars: <span id="bars">0</span></div>
      </div>

      <div id="ohlc" class="ov">
        <div class="title">OHLC</div>
        <div class="ohlc-row"><span class="ohlc-label">O</span><span class="ohlc-val" id="val-o">-</span></div>
        <div class="ohlc-row"><span class="ohlc-label">H</span><span class="ohlc-val" id="val-h">-</span></div>
        <div class="ohlc-row"><span class="ohlc-label">L</span><span class="ohlc-val" id="val-l">-</span></div>
        <div class="ohlc-row"><span class="ohlc-label">C</span><span class="ohlc-val" id="val-c">-</span></div>
      </div>

      <div class="plbl" style="top:10px;">Price</div>
      <div class="plbl" style="bottom:36px;">Volume</div>

      <div id="ctrlhint" class="ov">
        Drag: pan &middot; Scroll: zoom &middot; Dbl-click: reset &middot; 1-6: switch themes
      </div>
    </div>

    <script type="module" src="/src/main-themes.ts"></script>
  </body>
</html>
